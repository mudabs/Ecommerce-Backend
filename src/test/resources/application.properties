# Test datasource ? uses H2 in-memory so no external DB is required
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=postgres
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JWT ? use a Base64-encoded key that is long enough for HMAC-SHA256
spring.app.jwtSecret=dGVzdFNlY3JldEtleUZvclNtYXJ0Q2FydEVjb21tZXJjZVRlc3RpbmdQdXJwb3Nlcw==
spring.app.jwtExpirationMs=3000000
spring.app.jwtCookieName=springBootEcom

# Stripe ? placeholder so the bean initialises without a real key
stripe.secret.key=sk_test_placeholder

# Suppress open-in-view warning
spring.jpa.open-in-view=false

frontend.url=http://localhost:5173
app.cors.allowed-origins=${frontend.url},http://localhost:3000
image.base.url=http://localhost:5000/images
project.image=images/

